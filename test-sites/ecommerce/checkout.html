<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Checkout — DemoShop · ConsentShield demo</title>
<link rel="stylesheet" href="/shared/demo.css" />
<script>
window.__DEMO_TRACKERS__ = {
  analytics: [{ src: 'https://www.googletagmanager.com/gtag/js?id=G-DEMOSHOP' }],
  marketing: [{ src: 'https://connect.facebook.net/en_US/fbevents.js' }],
  essential: [{ src: 'https://checkout.razorpay.com/v1/checkout.js' }]
}
</script>
<script async src="/shared/banner-loader.js"></script>
<script defer src="/shared/demo.js"></script>
</head>
<body data-page="checkout">
<header class="site-head">
  <div class="wrap" style="display:flex;align-items:center;justify-content:space-between">
    <div class="brand"><a href="/ecommerce/">DemoShop</a></div>
    <nav>
      <a href="/ecommerce/cart.html">Back to cart</a>
    </nav>
  </div>
</header>

<main class="wrap" style="padding:32px 24px;max-width:720px">
  <h1 style="margin:0 0 16px">Checkout</h1>

  <form class="panel" style="padding:20px" onsubmit="event.preventDefault(); alert('Demo only — no real order placed.');">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.in" required>
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+91 98000 00000" required>
    </div>
    <div class="field">
      <label for="name">Shipping name</label>
      <input id="name" name="name" type="text" autocomplete="name" placeholder="Full name" required>
    </div>
    <div class="field">
      <label for="addr">Shipping address</label>
      <input id="addr" name="addr" type="text" autocomplete="street-address" placeholder="Line 1, Line 2, City, PIN" required>
    </div>

    <div class="panel" style="padding:12px 16px;margin-top:16px">
      <div class="sum"><span>Subtotal</span><span>₹6,398</span></div>
      <div class="sum"><span>GST (18%)</span><span>₹1,152</span></div>
      <div class="sum total"><span>Total</span><span>₹7,550</span></div>
    </div>

    <button class="btn" style="margin-top:16px" type="submit">Pay with Razorpay</button>
  </form>

  <div class="panel status">
    <h3>Consent state (live)</h3>
    <pre id="status">Waiting for banner interaction…</pre>
  </div>
</main>

<footer class="site-foot wrap">
  <div class="links">
    <a href="/">All demos</a>
    <a href="https://consentshield.in/privacy">Privacy notice</a>
    <a href="https://consentshield.in/rights">Your data rights</a>
  </div>
  <p>Fake products. Real consent events.</p>
</footer>
</body>
</html>
