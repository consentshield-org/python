openapi: "3.1.0"
info:
  title: ConsentShield Compliance API
  version: "1.0.0"
  description: >
    Bearer-authenticated compliance API for DPDP consent events, rights requests,
    audit logs, and data deletion. All endpoints require a `cs_live_*` API key
    issued from the ConsentShield dashboard.
  contact:
    name: ConsentShield Support
    email: support@consentshield.in

servers:
  - url: https://app.consentshield.in/api/v1
    description: Production

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "cs_live_<token>"
      description: >
        Obtain a `cs_live_*` API key from Settings → API keys in the dashboard.
        Include it as `Authorization: Bearer cs_live_<token>` on every request.

  schemas:
    Problem:
      type: object
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

    PingResponse:
      type: object
      required: [ok, org_id, account_id, scopes, rate_tier]
      properties:
        ok:
          type: boolean
          example: true
        org_id:
          type: string
          format: uuid
          nullable: true
        account_id:
          type: string
          format: uuid
        scopes:
          type: array
          items:
            type: string
          example: ["read:consent", "write:consent"]
        rate_tier:
          type: string
          example: starter

    VerifyResponse:
      type: object
      required: [property_id, identifier_type, purpose_code, status, evaluated_at]
      properties:
        property_id:
          type: string
          format: uuid
        identifier_type:
          type: string
          enum: [email, phone, pan, aadhaar, custom]
        purpose_code:
          type: string
          example: marketing
        status:
          type: string
          enum: [granted, revoked, expired, never_consented]
        active_artefact_id:
          type: string
          nullable: true
          description: Present only when status=granted. Opaque identifier.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Present only when status=revoked.
        revocation_record_id:
          type: string
          format: uuid
          nullable: true
          description: Pointer to artefact_revocations row. Present only when status=revoked.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Artefact expiry timestamp. Null for never_consented.
        evaluated_at:
          type: string
          format: date-time
          description: Server-side ISO 8601 timestamp at which this verification was computed.

    VerifyBatchRequest:
      type: object
      required: [property_id, identifier_type, purpose_code, identifiers]
      properties:
        property_id:
          type: string
          format: uuid
        identifier_type:
          type: string
          enum: [email, phone, pan, aadhaar, custom]
        purpose_code:
          type: string
          example: marketing
        identifiers:
          type: array
          minItems: 1
          maxItems: 10000
          items:
            type: string
            description: Non-empty string. Will be normalised per identifier_type.

    VerifyBatchResultRow:
      type: object
      required: [identifier, status]
      properties:
        identifier:
          type: string
          description: Echoed verbatim from input in the same position.
        status:
          type: string
          enum: [granted, revoked, expired, never_consented]
        active_artefact_id:
          type: string
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revocation_record_id:
          type: string
          format: uuid
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    VerifyBatchResponse:
      type: object
      required: [property_id, identifier_type, purpose_code, evaluated_at, results]
      properties:
        property_id:
          type: string
          format: uuid
        identifier_type:
          type: string
        purpose_code:
          type: string
        evaluated_at:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/VerifyBatchResultRow"

    RecordRequest:
      type: object
      required: [property_id, data_principal_identifier, identifier_type, purpose_definition_ids, captured_at]
      properties:
        property_id:
          type: string
          format: uuid
        data_principal_identifier:
          type: string
          description: Customer-supplied identifier; hashed server-side and never stored in plaintext.
        identifier_type:
          type: string
          enum: [email, phone, pan, aadhaar, custom]
        purpose_definition_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: Purposes the data principal granted consent for. Each produces an artefact.
        rejected_purpose_definition_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Optional. Purposes presented but rejected by the data principal. Recorded in consent_events audit row for §11 audit; no artefact is created.
        captured_at:
          type: string
          format: date-time
          description: When the consent was actually captured (kiosk / call-centre / branch / app). Must be within ±15 minutes of the server's clock.
        client_request_id:
          type: string
          description: Optional caller-supplied idempotency key. Reuse returns the same envelope instead of creating new rows.

    RecordedArtefact:
      type: object
      required: [purpose_definition_id, purpose_code, artefact_id, status]
      properties:
        purpose_definition_id:
          type: string
          format: uuid
        purpose_code:
          type: string
        artefact_id:
          type: string
          description: Opaque artefact identifier. Keep it — the caller will need it for revocation via /consent/artefacts/{id}/revoke.
        status:
          type: string
          example: active

    RecordResponse:
      type: object
      required: [event_id, created_at, artefact_ids, idempotent_replay]
      properties:
        event_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        artefact_ids:
          type: array
          items:
            $ref: "#/components/schemas/RecordedArtefact"
        idempotent_replay:
          type: boolean
          description: true when this response is a replay of an earlier call made with the same client_request_id.

    ArtefactListItem:
      type: object
      required: [artefact_id, property_id, purpose_code, status, created_at]
      properties:
        artefact_id:          { type: string }
        property_id:          { type: string, format: uuid }
        purpose_code:         { type: string }
        purpose_definition_id: { type: string, format: uuid }
        data_scope:           { type: array, items: { type: string } }
        framework:            { type: string, enum: [dpdp, abdm, gdpr] }
        status:               { type: string, enum: [active, revoked, expired, replaced] }
        expires_at:           { type: string, format: date-time, nullable: true }
        revoked_at:           { type: string, format: date-time, nullable: true }
        revocation_record_id: { type: string, format: uuid, nullable: true }
        replaced_by:          { type: string, nullable: true }
        identifier_type:      { type: string, enum: [email, phone, pan, aadhaar, custom], nullable: true }
        created_at:           { type: string, format: date-time }

    ArtefactListResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArtefactListItem"
        next_cursor:
          type: string
          nullable: true
          description: Opaque keyset cursor. Echo back in the next request's `cursor` query param to fetch the next page. Null when this is the last page.

    ArtefactRevocation:
      type: object
      required: [id, revoked_by_type, created_at]
      properties:
        id:              { type: string, format: uuid }
        reason:          { type: string, nullable: true }
        revoked_by_type: { type: string }
        revoked_by_ref:  { type: string, nullable: true }
        created_at:      { type: string, format: date-time }

    ArtefactDetail:
      allOf:
        - $ref: "#/components/schemas/ArtefactListItem"
        - type: object
          required: [revocation, replacement_chain]
          properties:
            revocation:
              nullable: true
              $ref: "#/components/schemas/ArtefactRevocation"
            replacement_chain:
              type: array
              items:
                type: string
              description: All artefact_ids in this replacement chain in chronological order (earliest to latest). Single-element array when the artefact has no predecessors or successors.

    EventListItem:
      type: object
      required: [id, property_id, source, event_type, created_at]
      properties:
        id:                      { type: string, format: uuid }
        property_id:             { type: string, format: uuid }
        source:                  { type: string, enum: [web, api, sdk] }
        event_type:              { type: string }
        purposes_accepted_count: { type: integer }
        purposes_rejected_count: { type: integer }
        identifier_type:         { type: string, nullable: true }
        artefact_count:          { type: integer }
        created_at:              { type: string, format: date-time }

    EventListResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EventListItem"
        next_cursor:
          type: string
          nullable: true

    RevokeRequest:
      type: object
      required: [reason_code, actor_type]
      properties:
        reason_code:
          type: string
          description: "Machine-readable reason tag, e.g. user_withdrawal, user_preference_change, business_withdrawal, data_breach, regulatory_instruction."
        reason_notes:
          type: string
          description: Optional free-text notes preserved on the revocation row.
        actor_type:
          type: string
          enum: [user, operator, system]
        actor_ref:
          type: string
          description: "Optional caller-supplied reference (user_id, operator_email, system task id). Stored on the revocation row for §11 audit."

    RevokeResponse:
      type: object
      required: [artefact_id, status, revocation_record_id, idempotent_replay]
      properties:
        artefact_id:          { type: string }
        status:               { type: string, enum: [revoked] }
        revocation_record_id: { type: string, format: uuid }
        idempotent_replay:
          type: boolean
          description: true when the artefact was already revoked and this response is a replay of the original revocation.

    DeletionTriggerRequest:
      type: object
      required: [property_id, data_principal_identifier, identifier_type, reason]
      properties:
        property_id:               { type: string, format: uuid }
        data_principal_identifier: { type: string }
        identifier_type:           { type: string, enum: [email, phone, pan, aadhaar, custom] }
        reason:
          type: string
          enum: [consent_revoked, erasure_request, retention_expired]
          description: "`consent_revoked` requires purpose_codes; `erasure_request` sweeps all active artefacts for the principal; `retention_expired` is not yet implemented (returns 501)."
        purpose_codes:
          type: array
          items: { type: string }
          description: Required when reason=consent_revoked.
        scope_override:
          type: array
          items: { type: string }
          description: Optional data-scope override for retention_expired (future).
        actor_type:
          type: string
          enum: [user, operator, system]
        actor_ref:
          type: string

    DeletionTriggerResponse:
      type: object
      required: [reason, revoked_artefact_ids, initial_status]
      properties:
        reason:               { type: string, enum: [consent_revoked, erasure_request, retention_expired] }
        revoked_artefact_ids: { type: array, items: { type: string } }
        revoked_count:        { type: integer, nullable: true }
        initial_status:       { type: string, example: pending }
        note:                 { type: string }

    DeletionReceiptRow:
      type: object
      required: [id, trigger_type, target_system, status, created_at]
      properties:
        id:             { type: string, format: uuid }
        trigger_type:   { type: string }
        trigger_id:     { type: string, format: uuid, nullable: true }
        artefact_id:    { type: string, nullable: true }
        connector_id:   { type: string, format: uuid, nullable: true }
        target_system:  { type: string }
        status:         { type: string }
        retry_count:    { type: integer }
        failure_reason: { type: string, nullable: true }
        requested_at:   { type: string, format: date-time, nullable: true }
        confirmed_at:   { type: string, format: date-time, nullable: true }
        created_at:     { type: string, format: date-time }

    DeletionReceiptsResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DeletionReceiptRow"
        next_cursor:
          type: string
          nullable: true

  responses:
    Unauthorized:
      description: Missing, malformed, or invalid API key.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    Gone:
      description: API key has been revoked.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate-limit window resets.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Requests allowed per hour for this key's tier.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    KeySelfResponse:
      type: object
      required: [key_id, account_id, name, key_prefix, scopes, rate_tier, created_at]
      properties:
        key_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
          nullable: true
          description: null for account-scoped keys.
        name:
          type: string
          example: "My production key"
        key_prefix:
          type: string
          example: "cs_live_ABC"
          description: First 16 characters of the key, shown in the dashboard.
        scopes:
          type: array
          items:
            type: string
          example: ["read:consent", "write:consent", "read:artefacts"]
        rate_tier:
          type: string
          example: "starter"
          enum: [starter, growth, pro, enterprise, sandbox]
        created_at:
          type: string
          format: date-time
        last_rotated_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Always null on a successful response — revoked keys are rejected at the Bearer layer (410 Gone) before this endpoint runs.

    UsageDayRow:
      type: object
      required: [day, request_count, p50_ms, p95_ms]
      properties:
        day:
          type: string
          format: date
          example: "2026-04-21"
        request_count:
          type: integer
          minimum: 0
          example: 1423
        p50_ms:
          type: number
          minimum: 0
          example: 18.4
        p95_ms:
          type: number
          minimum: 0
          example: 47.2

    PurposeItem:
      type: object
      required: [id, purpose_code, display_name, data_scope, default_expiry_days, framework, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        purpose_code:
          type: string
          example: "marketing"
        display_name:
          type: string
          example: "Marketing communications"
        description:
          type: string
          nullable: true
        data_scope:
          type: array
          items:
            type: string
          example: ["email_address", "phone_number"]
        default_expiry_days:
          type: integer
          example: 365
        auto_delete_on_expiry:
          type: boolean
        is_required:
          type: boolean
          description: Whether this purpose is mandatory (required for the service to function; no opt-out under DPDP).
        framework:
          type: string
          example: "dpdp"
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PurposeListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurposeItem"
          description: Ordered alphabetically by purpose_code.

    PropertyItem:
      type: object
      required: [id, name, url, allowed_origins, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "ACME production"
        url:
          type: string
          example: "https://acme.example.com"
        allowed_origins:
          type: array
          items:
            type: string
          example: ["https://acme.example.com", "https://www.acme.example.com"]
        snippet_verified_at:
          type: string
          format: date-time
          nullable: true
        snippet_last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PropertyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PropertyItem"
          description: >
            Ordered by created_at asc. The HMAC `event_signing_secret` is deliberately
            omitted — it's a server-only key used by the Cloudflare Worker to verify
            inbound events and must never leak to API consumers.

    UsageResponse:
      type: object
      required: [key_id, days, series]
      properties:
        key_id:
          type: string
          format: uuid
        days:
          type: integer
          minimum: 1
          maximum: 30
          example: 7
        series:
          type: array
          items:
            $ref: "#/components/schemas/UsageDayRow"
          description: One row per day. Most recent first. Days with no activity have counts of 0.

paths:
  /_ping:
    get:
      operationId: ping
      summary: Canary health-check
      description: >
        Returns the resolved context for the authenticated key.
        Use this to verify your API key is valid, confirm scopes, and check
        the rate tier before calling data endpoints.
      tags: [Utility]
      responses:
        "200":
          description: Key is valid and active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "410":
          $ref: "#/components/responses/Gone"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /consent/verify:
    get:
      operationId: consentVerify
      summary: Single-identifier consent verification
      description: >
        DPDP §6 runtime check. Given a data principal identifier, property,
        and purpose code, returns whether consent is currently granted,
        revoked, expired, or never recorded. Identifier is hashed server-side
        with the org's per-org salt — plaintext is never stored.
      tags: [Consent]
      security:
        - bearerAuth: [read:consent]
      parameters:
        - in: query
          name: property_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: data_principal_identifier
          required: true
          schema:
            type: string
          description: "Caller's identifier for the data principal (email, phone, PAN, etc.). Hashed server-side; never stored."
        - in: query
          name: identifier_type
          required: true
          schema:
            type: string
            enum: [email, phone, pan, aadhaar, custom]
          description: "Determines normalisation rule: email=trim+lowercase; phone/aadhaar=digits only; pan=trim+uppercase; custom=trim. Callers MUST use the same type at record-time and verify-time."
        - in: query
          name: purpose_code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Key is valid but lacks the read:consent scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: property_id does not belong to the key's org.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "410":
          $ref: "#/components/responses/Gone"
        "422":
          description: Missing query param / empty identifier / unknown identifier_type.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /consent/artefacts:
    get:
      operationId: consentArtefactsList
      summary: List consent artefacts (cursor-paginated)
      description: >
        Returns artefacts for the key's org with keyset pagination and optional
        filters. `data_principal_identifier` + `identifier_type` must be
        supplied together to filter by identity.
      tags: [Consent]
      security:
        - bearerAuth: [read:artefacts]
      parameters:
        - in: query
          name: property_id
          schema: { type: string, format: uuid }
        - in: query
          name: data_principal_identifier
          schema: { type: string }
        - in: query
          name: identifier_type
          schema: { type: string, enum: [email, phone, pan, aadhaar, custom] }
        - in: query
          name: status
          schema: { type: string, enum: [active, revoked, expired, replaced] }
        - in: query
          name: purpose_code
          schema: { type: string }
        - in: query
          name: expires_before
          schema: { type: string, format: date-time }
        - in: query
          name: expires_after
          schema: { type: string, format: date-time }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Paged list envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtefactListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Key is valid but lacks read:artefacts scope.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "410": { $ref: "#/components/responses/Gone" }
        "422":
          description: Invalid filter combination, bad cursor, malformed identifier, or bad limit/date.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /consent/artefacts/{id}:
    get:
      operationId: consentArtefactGet
      summary: Get a single consent artefact
      description: >
        Returns the artefact envelope + revocation record (if any) + full
        replacement chain in chronological order.
      tags: [Consent]
      security:
        - bearerAuth: [read:artefacts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Artefact detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtefactDetail"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Key is valid but lacks read:artefacts scope.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: No artefact with that id belongs to the key's org.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "410": { $ref: "#/components/responses/Gone" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /consent/artefacts/{id}/revoke:
    post:
      operationId: consentArtefactRevoke
      summary: Revoke a consent artefact
      description: >
        Records a revocation event for the artefact. The ADR-0022 cascade
        trigger flips consent_artefacts.status to `revoked` and updates the
        consent_artefact_index. Idempotent — calling revoke on an already-
        revoked artefact returns 200 with the existing revocation_record_id.
        Terminal states (`expired`, `replaced`) cannot be revoked and return 409.
      tags: [Consent]
      security:
        - bearerAuth: [write:artefacts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
      responses:
        "200":
          description: Revoked (new or idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Key is valid but lacks write:artefacts scope.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: No artefact with that id belongs to the key's org.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: Artefact is in a terminal state (expired or replaced) and cannot be revoked.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "410": { $ref: "#/components/responses/Gone" }
        "422":
          description: Missing reason_code, malformed body, or unknown actor_type.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /consent/events:
    get:
      operationId: consentEventsList
      summary: List consent events (summary only, cursor-paginated)
      description: >
        Returns paginated summaries (counts, not full payloads) of
        consent_events rows. Use for §11 audit timelines.
      tags: [Consent]
      security:
        - bearerAuth: [read:consent]
      parameters:
        - in: query
          name: property_id
          schema: { type: string, format: uuid }
        - in: query
          name: created_after
          schema: { type: string, format: date-time }
        - in: query
          name: created_before
          schema: { type: string, format: date-time }
        - in: query
          name: source
          schema: { type: string, enum: [web, api, sdk] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Paged event list envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Key is valid but lacks read:consent scope.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "410": { $ref: "#/components/responses/Gone" }
        "422":
          description: Bad cursor, limit, date, or source.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /deletion/trigger:
    post:
      operationId: deletionTrigger
      summary: Trigger deletion orchestration for a data principal
      description: >
        Inserts `artefact_revocations` rows for every active artefact matching
        the scope. The ADR-0022 cascade + process-artefact-revocation Edge
        Function then create `deletion_receipts` asynchronously.
        `retention_expired` mode is not yet implemented (returns 501).
      tags: [Deletion]
      security:
        - bearerAuth: [write:deletion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletionTriggerRequest"
      responses:
        "202":
          description: Revocations inserted; deletion_receipts are being created asynchronously.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionTriggerResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Key is valid but lacks write:deletion scope.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: property_id does not belong to the key's org.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "410": { $ref: "#/components/responses/Gone" }
        "422":
          description: Invalid body, missing purpose_codes for consent_revoked, or unknown reason/actor_type/identifier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "501":
          description: retention_expired mode is not yet implemented.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /deletion/receipts:
    get:
      operationId: deletionReceiptsList
      summary: List deletion receipts
      description: >
        Cursor-paginated list with filters on status, connector, source
        artefact_id, and issue date range.
      tags: [Deletion]
      security:
        - bearerAuth: [read:deletion]
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: connector_id
          schema: { type: string, format: uuid }
        - in: query
          name: artefact_id
          schema: { type: string }
        - in: query
          name: issued_after
          schema: { type: string, format: date-time }
        - in: query
          name: issued_before
          schema: { type: string, format: date-time }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Paged list envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionReceiptsResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Key is valid but lacks read:deletion scope.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "410": { $ref: "#/components/responses/Gone" }
        "422":
          description: Bad cursor, limit, or date.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /consent/record:
    post:
      operationId: consentRecord
      summary: Mode B server-to-server consent capture
      description: >
        Records a consent event captured outside the browser (mobile app,
        call-centre, branch, kiosk, in-person) and issues one artefact per
        granted purpose. Use client_request_id for safe retries.
      tags: [Consent]
      security:
        - bearerAuth: [write:consent]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordRequest"
      responses:
        "201":
          description: Consent recorded; artefacts created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"
        "200":
          description: Idempotent replay — a prior call with the same client_request_id returned this envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Key is valid but lacks the write:consent scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: property_id does not belong to the key's org.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "410":
          $ref: "#/components/responses/Gone"
        "422":
          description: Missing/invalid field, stale captured_at, empty purposes, purpose id from another org, or unknown identifier_type.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /consent/verify/batch:
    post:
      operationId: consentVerifyBatch
      summary: Batched consent verification
      description: >
        Same semantics as GET /consent/verify but accepts up to 10,000
        identifiers in a single call, all sharing the same property_id,
        identifier_type, and purpose_code. Response preserves input order.
        All-or-nothing: if any identifier fails normalisation (empty /
        unknown type), the entire call returns 422.
      tags: [Consent]
      security:
        - bearerAuth: [read:consent]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyBatchRequest"
      responses:
        "200":
          description: Batch verification envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyBatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Key is valid but lacks the read:consent scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: property_id does not belong to the key's org.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "410":
          $ref: "#/components/responses/Gone"
        "413":
          description: identifiers array exceeds 10000 elements.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: Missing body field / empty identifiers / malformed individual identifier / unknown identifier_type.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /keys/self:
    get:
      operationId: keySelf
      summary: Introspect the Bearer token's own metadata
      description: >
        Returns the public metadata of the API key presented as the Bearer
        token. Useful for SDK setup wizards (confirm scopes) and health
        checks. No scope gate — any valid Bearer can introspect itself.
      responses:
        "200":
          description: Key metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeySelfResponse"
              example:
                key_id: "9b2f6e1a-2e5c-4c4f-90df-8d0a9b7f1e1c"
                account_id: "3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a"
                org_id: "11111111-2222-3333-4444-555555555555"
                name: "My production key"
                key_prefix: "cs_live_ABC1234"
                scopes: ["read:consent", "write:consent", "read:artefacts"]
                rate_tier: "starter"
                created_at: "2026-04-10T09:30:00Z"
                last_rotated_at: null
                expires_at: null
                revoked_at: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "410":
          $ref: "#/components/responses/Gone"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /usage:
    get:
      operationId: usage
      summary: Per-day request count + latency for the Bearer token
      description: >
        Returns a day-by-day usage series for the presenting API key over the
        last `days` days (default 7, min 1, max 30). Zero-filled for days
        with no activity. Most recent day first.
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
      responses:
        "200":
          description: Usage series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
              example:
                key_id: "9b2f6e1a-2e5c-4c4f-90df-8d0a9b7f1e1c"
                days: 7
                series:
                  - day: "2026-04-21"
                    request_count: 1423
                    p50_ms: 18.4
                    p95_ms: 47.2
                  - day: "2026-04-20"
                    request_count: 892
                    p50_ms: 17.1
                    p95_ms: 42.0
                  - day: "2026-04-19"
                    request_count: 0
                    p50_ms: 0
                    p95_ms: 0
        "401":
          $ref: "#/components/responses/Unauthorized"
        "410":
          $ref: "#/components/responses/Gone"
        "422":
          description: days out of range (must be 1..30).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /purposes:
    get:
      operationId: purposeList
      summary: List purposes configured for the caller's org
      description: >
        Returns every `purpose_definitions` row for the caller's org.
        `/v1/consent/verify` and `/v1/consent/record` both require a valid
        `purpose_code` or `purpose_definition_id` from this list.

        Requires an org-scoped API key; account-scoped keys get 400.
      responses:
        "200":
          description: Purposes for the caller's org.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurposeListResponse"
              example:
                items:
                  - id: "7f4b3b21-5a11-4f37-9b7c-6f2e0d5c8b1a"
                    purpose_code: "marketing"
                    display_name: "Marketing communications"
                    description: "Email, SMS, and in-app campaigns"
                    data_scope: ["email_address", "phone_number"]
                    default_expiry_days: 365
                    auto_delete_on_expiry: true
                    is_required: false
                    framework: "dpdp"
                    is_active: true
                    created_at: "2026-03-14T08:12:00Z"
                    updated_at: "2026-03-14T08:12:00Z"
                  - id: "9e2c8a0c-1d8a-4a2c-a4bf-2b0e6b1f3c9d"
                    purpose_code: "analytics"
                    display_name: "Product analytics"
                    description: null
                    data_scope: ["page_views", "session_duration"]
                    default_expiry_days: 180
                    auto_delete_on_expiry: true
                    is_required: false
                    framework: "dpdp"
                    is_active: true
                    created_at: "2026-03-14T08:12:10Z"
                    updated_at: "2026-03-14T08:12:10Z"
        "400":
          description: API key is account-scoped; this endpoint requires an org-scoped key.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing `read:consent` scope, or API key is not authorised for this organisation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "410":
          $ref: "#/components/responses/Gone"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /properties:
    get:
      operationId: propertyList
      summary: List web properties configured for the caller's org
      description: >
        Returns every `web_properties` row for the caller's org.
        `property_id` values used throughout `/v1/consent/*` come from here.

        The HMAC `event_signing_secret` is **not** in the response — it's a
        server-only key used by the Cloudflare Worker to verify inbound
        events.

        Requires an org-scoped API key; account-scoped keys get 400.
      responses:
        "200":
          description: Web properties for the caller's org.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListResponse"
              example:
                items:
                  - id: "3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a"
                    name: "ACME production"
                    url: "https://acme.example.com"
                    allowed_origins:
                      - "https://acme.example.com"
                      - "https://www.acme.example.com"
                    snippet_verified_at: "2026-03-15T10:00:00Z"
                    snippet_last_seen_at: "2026-04-21T09:11:23Z"
                    created_at: "2026-03-14T09:00:00Z"
                    updated_at: "2026-03-15T10:00:00Z"
        "400":
          description: API key is account-scoped; this endpoint requires an org-scoped key.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing `read:consent` scope, or API key is not authorised for this organisation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "410":
          $ref: "#/components/responses/Gone"
        "429":
          $ref: "#/components/responses/TooManyRequests"
