<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 72" role="img" aria-label="ConsentShield — Compliance Engine">
  <!-- Icon: primary (navy bg + teal shield + white check), scaled 120->56 -->
  <g transform="translate(0 8) scale(0.4667)">
    <rect x="0" y="0" width="120" height="120" rx="26" ry="26" fill="#0F2D5B"/>
    <path d="M60 28 Q 86 30 88 36 L 88 64 Q 88 84 60 97 Q 32 84 32 64 L 32 36 Q 34 30 60 28 Z" fill="#0D7A6B"/>
    <path d="M46 62 L56 72 L76 52" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark: "Consent" navy + "Shield" teal, Satoshi Bold 700, -0.04em tracking -->
  <text x="72" y="42"
        font-family="Satoshi, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="700"
        font-size="26"
        letter-spacing="-1.04">
    <tspan fill="#0F2D5B">Consent</tspan><tspan fill="#0D7A6B">Shield</tspan>
  </text>

  <!-- Tagline: DM Sans Medium 500, 10px, 2px tracking, uppercase, slate -->
  <text x="72" y="60"
        font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="500"
        font-size="10"
        letter-spacing="2"
        fill="#94A3B8">COMPLIANCE ENGINE</text>
</svg>
