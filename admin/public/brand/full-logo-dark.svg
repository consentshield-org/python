<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 72" role="img" aria-label="ConsentShield — Compliance Engine">
  <defs>
    <linearGradient id="cs-grad-full-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091E3E"/>
      <stop offset="1" stop-color="#0D7A6B"/>
    </linearGradient>
  </defs>

  <!-- Icon: gradient variant (navy->teal gradient bg + teal-mid shield + white check) -->
  <g transform="translate(0 8) scale(0.4667)">
