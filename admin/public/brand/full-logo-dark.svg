    <path d="M60 28 Q 86 30 88 36 L 88 64 Q 88 84 60 97 Q 32 84 32 64 L 32 36 Q 34 30 60 28 Z" fill="#14A090"/>
    <path d="M46 62 L56 72 L76 52" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="72" y="42"
